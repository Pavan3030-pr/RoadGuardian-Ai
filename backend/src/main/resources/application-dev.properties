# Development Profile - In-Memory Database and No External Infra
spring.datasource.url=jdbc:h2:mem:roadguardian_dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Disable Redis for dev
spring.cache.type=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT Secret for dev
app.jwt.secret=devSecretKeyForJWTTokenGenerationAndValidationPurpose1234567890
app.jwt.expiration=86400000

# Logging
logging.level.com.roadguardian=DEBUG
