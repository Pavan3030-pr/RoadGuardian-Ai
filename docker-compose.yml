version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: roadguardian-db
    environment:
      POSTGRES_DB: ${DB_NAME:-roadguardian}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roadguardian-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: roadguardian-redis
    ports:
      - "6379:6379"
    networks:
      - roadguardian-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Backend Application
  backend:
    build:
      context: ./backend
    container_name: roadguardian-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-roadguardian}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForJWTTokenGenerationAndValidationPurpose123456789}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - roadguardian-network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
    container_name: roadguardian-frontend
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    depends_on:
      - backend
    networks:
      - roadguardian-network

volumes:
  postgres_data:

networks:
  roadguardian-network:
    driver: bridge
